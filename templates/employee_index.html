<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг IT-угроз - Сотрудник</title>
    <link rel="stylesheet" href="/static/styles/style.css?v=20260225210415">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Система мониторинга IT-угроз</h1>
            <div class="user-info">
                <a href="/employee/requests" class="nav-btn-small">Все заявки</a>
                <span class="user-type">Сотрудник</span>
                <span class="user-name">{{ .userName }}</span>
                <a href="/logout" class="logout-btn">Выход</a>
            </div>
        </div>
    </header>
    
    <main class="employee-main">
        <div class="form-container">
            <h2>Создать новую заявку об угрозе</h2>
            <form method="POST" action="/create-request" accept-charset="UTF-8">
                <div class="form-group">
                    <label for="category">Категория угрозы:</label>
                    <select name="category" id="category" required onchange="filterThreatTypes()">
                        <option value="">-- Выберите категорию --</option>
                        {{ range .categories }}
                        <option value="{{ .ID }}">{{ .Name }} (приоритет: {{ .Priority }})</option>
                        {{ end }}
                    </select>
                    <small>Выберите категорию, к которой относится обнаруженная угроза</small>
                </div>

                <div class="form-group">
                    <label for="threat_type">Тип угрозы:</label>
                    <select name="threat_type" id="threat_type" required>
                        <option value="">-- Выберите тип угрозы --</option>
                        {{ range .threatTypes }}
                        <option value="{{ .ID }}" data-category="{{ .CategoryID }}" style="display: none;">{{ .Name }}</option>
                        {{ end }}
                    </select>
                    <small>Тип угрозы будет отфильтрован в зависимости от выбранной категории</small>
                </div>

                <div class="form-group">
                    <label for="description">Описание угрозы:</label>
                    <textarea name="description" id="description" rows="6" required placeholder="Подробно опишите обнаруженную IT-угрозу:&#10;- Что было замечено&#10;- Когда это произошло&#10;- Какой ущерб возможен"></textarea>
                    <small>Предоставьте как можно больше деталей для лучшей оценки угрозы</small>
                </div>

                <button class="wide-button" type="submit">✓ Отправить заявку</button>
            </form>
        </div>
    </main>
    
    <script>
        function filterThreatTypes() {
            const selectedCategory = document.getElementById('category').value;
            const threatTypeSelect = document.getElementById('threat_type');
            const options = threatTypeSelect.querySelectorAll('option');
            
            options.forEach(option => {
                if (option.value === '') {
                    option.style.display = 'block';
                } else {
                    const category = option.getAttribute('data-category');
                    if (selectedCategory === '' || category === selectedCategory) {
                        option.style.display = 'block';
                    } else {
                        option.style.display = 'none';
                    }
                }
            });
            
            threatTypeSelect.value = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            filterThreatTypes();
        });
    </script>
</body>
</html>
