<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему мониторинга IT-угроз</title>
    <link rel="stylesheet" href="/static/styles/style.css?v=20260225210415">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Система мониторинга IT-угроз</h1>
        </div>
    </header>
    
    <div class="login-container">
        <h1>Вход в систему</h1>
        
        {{ if .error }}
            <div class="error">{{ .error }}</div>
        {{ end }}
        
        <form method="POST">
            <div class="form-group">
                <label for="user_type">Тип пользователя:</label>
                <select name="user_type" id="user_type" required>
                    <option value="employee">Сотрудник</option>
                    <option value="specialist">Специалист</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" name="password" id="password" required placeholder="Введите пароль">
            </div>

            <button class="wide-button" type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
